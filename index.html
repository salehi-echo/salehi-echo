<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salehi EchoHemodynamics</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Salehi EchoHemodynamics</h1>
  <p>Clinical Echocardiography Assistant</p>
  <small>Developed by Dr. Salehi</small>
</header>

<div class="container">

  <h2>Aortic Stenosis Calculator</h2>

  <label>LVOT Diameter (cm)</label>
  <input id="lvot" type="number">

  <label>VTI LVOT (cm)</label>
  <input id="vti_lvot" type="number">

  <label>VTI Ao (cm)</label>
  <input id="vti_ao" type="number">

  <label>Vmax Ao (m/s)</label>
  <input id="vmax" type="number">

  <label>Mean Gradient (mmHg)</label>
  <input id="gradient" type="number">

  <label>BSA</label>
  <input id="bsa" type="number">

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
